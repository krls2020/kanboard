zerops:
  - setup: kanboard
    build:
      base: php@8.4
      os: ubuntu
      buildCommands:
        - composer install --no-dev --optimize-autoloader
      deployFiles: [.]
      cache: [vendor]
    run:
      prepareCommands:
        - sudo apk add --no-cache php84-ctype
      envVariables:
        DB_HOST: db
        DB_PORT: ${db_port}
        DB_NAME: ${db_dbName}
        DB_USER: ${db_user}
        DB_PASSWORD: ${db_password}
